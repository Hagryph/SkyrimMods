; HagGeneral - global settings (auto-global, not save-bound).
; The in-game HagUI "General" page edits these and auto-saves this file.
;
; Fullscreen/Borderless are imposed at the D3D swapchain hook, so a change takes
; effect on the NEXT game launch. Always Active can apply live once its offset is found.
[General]

; Exclusive fullscreen (true) vs windowed/borderless (false).
Fullscreen=false

; Borderless windowed (only when Fullscreen=false). true = borderless, false = bordered window.
Borderless=true

; Keep the game running/unpaused when its window loses focus (alt-tab).
AlwaysActive=false
