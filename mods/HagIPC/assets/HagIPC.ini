; HagIPC - local debug/IPC server. DEV TOOL.
; Exposes memory read/write, function call, code-exec and (soon) the in-game console to a
; localhost-only TCP client. Treat it like an attached debugger: do NOT enable it on a machine
; you don't trust, and do NOT ship it enabled to other users.
;
; This file lives next to HagIPC.dll (Data\SKSE\Plugins\HagIPC.ini). Edit it in the mod folder.

[HagIPC]
; turn the server off without uninstalling the plugin
Enabled = true
; localhost TCP port the client connects to (127.0.0.1 only)
Port = 19000
; optional shared secret; if set, the client's first line must be: auth <Token>
Token =
